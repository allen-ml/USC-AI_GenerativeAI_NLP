<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TAC 459 @USC</title>
    <script>
      // GitHub Pages SPA redirect: encode the current path into a query param
      // and redirect to the repo root so index.html is served.
      // pathSegmentsToKeep = 1 keeps the repo name segment (e.g. /USC-AI_GenerativeAI_NLP).
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
